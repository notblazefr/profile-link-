<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR NAME | AND A SMALL MSG</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6e00ff;
            --secondary: #ff0080;
            --dead: #ff2e2e;
            --bg: #050505;
            --online: #23a55a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        #spotlight {
            position: fixed; top: 0; left: 0;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(110, 0, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 0;
        }

        #cursor {
            width: 8px; height: 8px; background: white; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 999;
            box-shadow: 0 0 15px 5px rgba(110, 0, 255, 0.6);
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1s ease;
        }

        .glitch-text { font-size: 14px; letter-spacing: 5px; animation: pulse 2s infinite; color: #fff; }

        #main-content {
            opacity: 0; transform: scale(0.9);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .card {
            background: rgba(15, 15, 15, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 24px;
            text-align: center; width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .banner {
            height: 90px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: -40px -40px 55px -40px;
            border-radius: 24px 24px 0 0;
            opacity: 0.8;
        }

        .pfp-container { position: relative; display: inline-block; margin-top: -115px; z-index: 10; }
        .pfp { width: 115px; height: 115px; border-radius: 50%; border: 4px solid #0a0a0a; box-shadow: 0 0 20px rgba(110, 0, 255, 0.3); object-fit: cover; }
        .status-dot { position: absolute; bottom: 8px; right: 8px; width: 24px; height: 24px; background: var(--online); border: 4px solid #0f0f0f; border-radius: 50%; }

        h1 { font-size: 1.8rem; margin-top: 15px; letter-spacing: -1px; }

        .badges-container { display: flex; justify-content: center; gap: 8px; margin: 12px 0; }
        .badge { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 5px 10px; display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: #ccc; }
        .badge.dead { border-color: rgba(255, 46, 46, 0.4); color: #ff8a8a; animation: flicker 4s infinite; }
        .badge.dead i { color: var(--dead); }

        @keyframes flicker { 0%, 19%, 21%, 62%, 64%, 100% { opacity: 1; } 20%, 63% { opacity: 0.4; } }

        .typing-container { height: 20px; margin: 15px 0 25px 0; }
        .bio { font-size: 0.85rem; color: #aaa; }

        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-btn { text-decoration: none; color: #fff; background: rgba(255, 255, 255, 0.03); padding: 14px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08); font-size: 0.9rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .link-btn:hover { background: rgba(110, 0, 255, 0.2); transform: scale(1.03); border-color: var(--primary); }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="spotlight"></div>
    <div id="canvas-bg"></div>

    <div id="overlay" onclick="startSite()">
        <p class="glitch-text">[ CLICK TO ACCESS ]</p>
    </div>

    <div id="main-content">
        <audio id="bg-music" loop><source src="YOUR_MP3_LINK_HERE" type="audio/mpeg"></audio>

        <div class="card">
            <div class="banner"></div>
            <div class="pfp-container">
                <img src="YOUR AVATAR LINK HERE" alt="pfp" class="pfp">
                <div class="status-dot"></div>
            </div>
            <h1>YOUR NAME HERE</h1>
            <div class="badges-container">
                <div class="badge"><i class="fa-solid fa-code"></i> Dev</div>
                <div class="badge"><i class="fa-solid fa-check"></i> Verified</div>
                <div class="badge dead"><i class="fa-solid fa-skull-crossbones"></i> Dead / Lost</div>
            </div>
            <div class="typing-container"><span id="typewriter" class="bio"></span></div>
            <div class="links">
                <a href="#" class="link-btn"><i class="fa-brands fa-discord"></i> DC USER HERE</a>
                <a href="#" class="link-btn"><i class="fa-brands fa-github"></i> GITHUB USER HERE</a>
                <a href="#" class="link-btn"><i class="fa-brands fa-instagram"></i> INSTAGRAM USER HERE</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
        const cursor = document.getElementById('cursor');
        const spotlight = document.getElementById('spotlight');

        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            spotlight.style.left = e.clientX + 'px';
            spotlight.style.top = e.clientY + 'px';
        });

        const text = "YOUR NAME HERE | A SHORT BIO OR STATUS MESSAGE CAN GO HERE.";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 60);
            }
        }

        function startSite() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                document.getElementById('main-content').style.transform = 'scale(1)';
                typeWriter();
            }, 1000);

            const music = document.getElementById('bg-music');
            music.volume = 0.2;
            music.play();

            VANTA.NET({
                el: "#canvas-bg",
                mouseControls: true, touchControls: true,
                color: 0x6e00ff, backgroundColor: 0x050505,
                points: 12.00, maxDistance: 20.00, spacing: 16.00
            });
        }
    </script>
</body>
</html>
